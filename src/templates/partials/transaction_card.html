<div class="bg-base-200 p-4 rounded-lg mb-4" id="tx-{{ tx.id }}">
  <div class="flex justify-between items-start mb-2">
    <div>
      <div class="font-semibold">{{ tx.payee }}</div>
      <div class="text-sm opacity-70">{{ tx.txn_date }} · {{ tx.category or 'Uncategorized' }}</div>
    </div>
    <div class="text-right">
      <div class="font-mono font-semibold {% if tx.amount < 0 %}text-error{% else %}text-success{% endif %}">
        {{ "%.2f"|format(tx.amount) }}
      </div>
      <div class="text-xs opacity-70">{{ "%.0f"|format(tx.confidence * 100) }}% confidence</div>
    </div>
  </div>
  <div class="flex gap-2 mt-3">
    {% if tx.status == 'pending' %}
    <button
      hx-post="/transactions/{{ tx.id }}/confirm"
      hx-target="#tx-{{ tx.id }}"
      hx-swap="outerHTML"
      class="btn btn-success btn-sm"
    >Confirm</button>
    <button
      hx-post="/transactions/{{ tx.id }}/reject"
      hx-target="#tx-{{ tx.id }}"
      hx-swap="outerHTML"
      class="btn btn-error btn-sm"
    >Reject</button>
    {% elif tx.status == 'synced' %}
    <span class="badge badge-success">Synced</span>
    {% elif tx.status == 'rejected' %}
    <span class="badge badge-error">Rejected</span>
    {% endif %}
  </div>
</div>
